global_prefix: 'OneDWave'

magudi:
  input_file: magudi.inp
  forced_inputs:
    # Flattened from old magudi.root_files
    grid_file: OneDWave.xyz
    boundary_condition_file: bc.dat
    control_mollifier_file: OneDWave.control_mollifier.f
    target_mollifier_file: OneDWave.target_mollifier.f
    # Previously mutated by run_parallel.sh sed -- now declarative.
    # number_of_timesteps = segment_length; msforward iterates Nsplit segments of that length.
    number_of_timesteps: 240
    save_interval: 240
    controller_switch: true
    baseline_prediction_available: true
    adjoint_nonzero_initial_condition: false
    # Moved from top-level. Slash-keys in magudi.inp come from nesting here.
    time_splitting:
      number_of_segments: 2
      segment_length: 240
      start_timestep: 0
      penalty_weight: 1.6e-6           # consumed by msforward / msadjoint (bin/msforward.f90:116)
      periodic_solution: false
      state_controllability: 1.0
      use_state_mollifier: true
    penalty_norm:
      type: quadratic
      augmented_lagrangian: false

optimization:
  log_file: OneDWave.optim.h5
  tolerance: 1.0e-9
  line_search:
    log_file: OneDWave.line_search.txt
    type: "more-thuente"      # default for TAO BQNLS
    max_step: 1.0e+4
    min_step: 1.0e-5
    bracket_tol: 1.0e-1
    max_funcs: 30

# Each value is [nodes, procs]; the driver consumes procs (index 1).
# N_petsc is the rank count of the Python driver itself (mpirun -n N_petsc python3 ...);
# N_forward / N_adjoint are the rank counts of the children that the driver spawns via
# MPI_Comm_spawn. Do not change N_petsc mid-optimization: history.petsc is layout-bound.
resource_distribution:
  jobs:
    forward:      [1, 1]
    adjoint:      [1, 1]
    petsc:        [1, 3]

command_scriptor:
  type: base
  bash:
    enable_parallel: true