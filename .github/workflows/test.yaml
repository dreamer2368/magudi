name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  docker-image:
    uses: ./.github/workflows/docker.yml
  magudi-unit:
    runs-on: ubuntu-latest
    needs: [docker-image]
    container:
      image: ghcr.io/dreamer2368/magudi/magudi_env:latest
      # image: dreamer2368/magudi_env:latest
      options: --user 1001 --privileged
    name: CPU-test
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install magudi_utils
        run: |
          pip install --user ./utils/magudi_utils
          # Required by ctest: test/adjoint_relation/full_rhs.sh and
          # test/linearized_relation/full_rhs_linearized.sh stage an example
          # into a workdir and `python3 config.py`, which now does
          # `from magudi_utils import plot3dnasa as p3d`.
          # uid 1001 can't write /usr/local; pip falls back to ~/.local which
          # isn't on PATH in this container — expose it for the child python
          # processes.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=debug -DCMAKE_Fortran_COMPILER=mpif90 ../
      - name: Make
        run: |
          cd build
          make -j 16
      - name: Unit test
        run: |
          cd build
          CTEST_OUTPUT_ON_FAILURE=TRUE make test
  optim-grad-test:
    runs-on: ubuntu-latest
    needs: [docker-image]
    container:
      image: ghcr.io/dreamer2368/magudi/magudi_env:latest
      # image: dreamer2368/magudi_env:latest
      options: --user 1001 --privileged
    name: Optimization-gradient-test
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install magudi_utils
        run: |
          pip install --user ./utils/magudi_utils
          # uid 1001 can't write /usr/local; pip falls back to ~/.local which
          # isn't on PATH in this container. Expose it so subsequent steps
          # (and mpirun's forked workers) can find magudi-optim / magudi-msgrad.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=debug -DCMAKE_Fortran_COMPILER=mpif90 ../
      - name: Make
        run: |
          cd build
          make -j 16
      - name: Multi-point optimization gradient accuracy
        run: |
          cd build
          bash ../.github/workflows/run_msgrad.sh
  optim-parallel:
    runs-on: ubuntu-latest
    needs: [docker-image]
    container:
      image: ghcr.io/dreamer2368/magudi/magudi_env:latest
      # image: dreamer2368/magudi_env:latest
      options: --user 1001 --privileged
    name: Optimization-parallel
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install magudi_utils
        run: |
          pip install --user ./utils/magudi_utils
          # uid 1001 can't write /usr/local; pip falls back to ~/.local which
          # isn't on PATH in this container. Expose it so subsequent steps
          # (and mpirun's forked workers) can find magudi-optim / magudi-msgrad.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=debug -DCMAKE_Fortran_COMPILER=mpif90 ../
      - name: Make
        run: |
          cd build
          make -j 16
      - name: optim_ver4 parallel restart-equivalence test
        run: |
          cd build
          bash ../.github/workflows/run_parallel.sh
  optim-manual:
    runs-on: ubuntu-latest
    needs: [docker-image]
    container:
      image: ghcr.io/dreamer2368/magudi/magudi_env:latest
      # image: dreamer2368/magudi_env:latest
      options: --user 1001 --privileged
    name: Optimization-manual-case-a
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install magudi_utils
        run: |
          pip install --user ./utils/magudi_utils
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cmake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=debug -DCMAKE_Fortran_COMPILER=mpif90 ../
      - name: Make
        run: |
          cd build
          make -j 16
      - name: ManualBQNLS smoke test (one fwd+adj per allocation)
        run: |
          cd build
          bash ../.github/workflows/run_manual.sh
